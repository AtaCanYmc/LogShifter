name: Logshift Auto-Archiver Cron

on:
  schedule:
    # Runs daily at midnight UTC
    - cron: '0 0 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  archive-logs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Write configuration file
        run: |
          cat <<EOF > config.yaml
          supabase:
            url: "${{ secrets.SUPABASE_URL }}"
            key: "${{ secrets.SUPABASE_KEY }}"
            table_name: "${{ secrets.SUPABASE_TABLE_NAME }}"
            date_column: "${{ secrets.SUPABASE_DATE_COLUMN }}"
          github:
            token: "${{ secrets.LOGSHIFT_GITHUB_TOKEN }}"
            repo: "${{ secrets.LOGSHIFT_GITHUB_REPO }}"
            path: "logs/archive.json"
            branch: "main"
          EOF

      - name: Run Logshift Archiver
        run: |
          logshift archive --source supabase --dest github
